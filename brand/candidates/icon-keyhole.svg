<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: THE KEYHOLE — "the door is locked from the inside;
       we have already let you in." Pure geometry, circle-native. -->
  <defs>
    <radialGradient id="kh-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#160b09"/>
      <stop offset="58%" stop-color="#080303"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <radialGradient id="kh-bloom" cx="50%" cy="45%" r="46%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kh-key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3636"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#7c0000"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#kh-bg)"/>
  <circle cx="256" cy="248" r="198" fill="url(#kh-bloom)"/>

  <!-- gauge ring + tick band -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#000000" stroke-width="12"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#4a0000" stroke-width="4"/>
  <circle cx="256" cy="256" r="208" fill="none" stroke="#cc0000" stroke-width="15"
          stroke-dasharray="3 18.5" stroke-linecap="butt"/>

  <!-- keyhole: dark seat for a crisp edge, then the sigil over it -->
  <g>
    <circle cx="256" cy="216" r="67" fill="#1c0000"/>
    <path d="M 231 200 L 201 362 L 311 362 L 281 200 Z" fill="#1c0000"/>
    <circle cx="256" cy="216" r="60" fill="url(#kh-key)"/>
    <path d="M 237 204 L 211 354 L 301 354 L 275 204 Z" fill="url(#kh-key)"/>
    <!-- specular -->
    <ellipse cx="238" cy="198" rx="18" ry="14" fill="#ff6868" opacity="0.5"/>
  </g>

  <!-- two small registration diamonds, flanking -->
  <g fill="#cc0000">
    <path d="M 256 408 l 12 12 l -12 12 l -12 -12 Z"/>
  </g>
</svg>
