<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- DegenBot avatar — the keyhole, in the machine's cyan colorway.
       Same shape as the server icon (brand consistency), different hue
       so the bot is instantly tellable-apart at 32px. -->
  <defs>
    <radialGradient id="ba-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#06140f"/>
      <stop offset="58%" stop-color="#040908"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <radialGradient id="ba-bloom" cx="50%" cy="45%" r="46%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ba-key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dffef"/>
      <stop offset="50%" stop-color="#00f5d4"/>
      <stop offset="100%" stop-color="#009d88"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#ba-bg)"/>
  <circle cx="256" cy="248" r="198" fill="url(#ba-bloom)"/>

  <!-- gauge ring + tick band, cyan -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#000000" stroke-width="12"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#06443c" stroke-width="4"/>
  <circle cx="256" cy="256" r="208" fill="none" stroke="#00f5d4" stroke-width="15"
          stroke-dasharray="3 18.5" stroke-linecap="butt"/>

  <!-- keyhole -->
  <g>
    <circle cx="256" cy="216" r="67" fill="#04211d"/>
    <path d="M 231 200 L 201 362 L 311 362 L 281 200 Z" fill="#04211d"/>
    <circle cx="256" cy="216" r="60" fill="url(#ba-key)"/>
    <path d="M 237 204 L 211 354 L 301 354 L 275 204 Z" fill="url(#ba-key)"/>
    <ellipse cx="238" cy="198" rx="18" ry="14" fill="#d2fff8" opacity="0.55"/>
  </g>

  <!-- registration diamond stays oxblood — the family tie to the server icon -->
  <path d="M 256 408 l 12 12 l -12 12 l -12 -12 Z" fill="#cc0000"/>
</svg>
