<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff2e7c"/>
      <stop offset="55%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="#040404"/>

  <!-- subtle grid -->
  <g stroke="rgba(204,0,0,0.05)" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- glow plate -->
  <circle cx="256" cy="256" r="230" fill="#1a0000"/>

  <!-- outer black frame -->
  <rect x="68" y="68" width="376" height="376" fill="none" stroke="#000" stroke-width="10"/>

  <!-- vesica-piscis eye, centered horizontally, slightly raised -->
  <!-- white sclera with thick black outline -->
  <path d="M 88 256 Q 256 60 424 256 Q 256 452 88 256 Z"
        fill="#f5efe1" stroke="#000" stroke-width="14"/>

  <!-- iris -->
  <circle cx="256" cy="256" r="92" fill="url(#iris)" stroke="#000" stroke-width="6"/>

  <!-- vertical slit pupil (animal-y) -->
  <ellipse cx="256" cy="256" rx="10" ry="60" fill="#000"/>

  <!-- catchlight highlight -->
  <circle cx="284" cy="232" r="14" fill="#fff" opacity="0.78"/>
  <circle cx="290" cy="226" r="5"  fill="#fff"/>

  <!-- corner badge: BOT in mono -->
  <g>
    <rect x="56" y="56" width="80" height="34" fill="#ffd400" stroke="#000" stroke-width="4"/>
    <text x="96" y="81" font-family="IBM Plex Mono" font-weight="700" font-size="22"
          text-anchor="middle" fill="#000" letter-spacing="3">BOT</text>
  </g>

  <!-- bottom-right: pinprick red bulbs (3) -->
  <g fill="#ff2222">
    <circle cx="386" cy="446" r="5"/>
    <circle cx="408" cy="446" r="5"/>
    <circle cx="430" cy="446" r="5"/>
  </g>

