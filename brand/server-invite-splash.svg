<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Invite splash — full-bleed showcase. Keyhole right, manifesto-voice
       wordmark left, classification strip, grid + scanlines. -->
  <defs>
    <radialGradient id="sp-bg" cx="66%" cy="38%" r="92%">
      <stop offset="0%" stop-color="#1c0d0b"/>
      <stop offset="52%" stop-color="#0a0403"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <radialGradient id="sp-bloom" cx="70%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3636"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#7c0000"/>
    </linearGradient>
    <pattern id="sp-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#cc0000" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="sp-scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#000000" fill-opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#sp-bg)"/>
  <rect width="1920" height="1080" fill="url(#sp-grid)"/>
  <circle cx="1300" cy="520" r="560" fill="url(#sp-bloom)"/>

  <!-- classification strip -->
  <rect x="0" y="0" width="1920" height="58" fill="#050505"/>
  <line x1="0" y1="58" x2="1920" y2="58" stroke="#cc0000" stroke-width="2"/>
  <text x="60" y="38" font-family="IBM Plex Mono" font-size="20" fill="#ff2222" letter-spacing="6">// RESTRICTED // EVIDENCE LOG // DEGEN OR DEATH // PROCEED VOLUNTARILY //</text>

  <!-- bottom strip -->
  <line x1="0" y1="1022" x2="1920" y2="1022" stroke="#cc0000" stroke-width="2"/>
  <text x="60" y="1058" font-family="IBM Plex Mono" font-size="22" fill="#8a857f" letter-spacing="5">degeneratefuckface.com</text>
  <text x="1860" y="1058" text-anchor="end" font-family="IBM Plex Mono" font-size="22" fill="#8a857f" letter-spacing="5">file no&#183;001 &#183; self-hosted &#183; ground-up</text>

  <!-- partial gauge arc -->
  <circle cx="1336" cy="556" r="430" fill="none" stroke="#cc0000" stroke-width="14"
          stroke-dasharray="4 40" opacity="0.5"/>

  <!-- keyhole, large, right -->
  <g>
    <circle cx="1336" cy="430" r="184" fill="#1c0000"/>
    <path d="M 1264 396 L 1182 836 L 1490 836 L 1408 396 Z" fill="#1c0000"/>
    <circle cx="1336" cy="430" r="168" fill="url(#sp-key)"/>
    <path d="M 1280 408 L 1208 820 L 1464 820 L 1392 408 Z" fill="url(#sp-key)"/>
    <ellipse cx="1284" cy="398" rx="48" ry="38" fill="#ff6868" opacity="0.48"/>
  </g>

  <!-- wordmark -->
  <text x="118" y="470" font-family="Anton" font-size="248" fill="#f0ebe3" letter-spacing="3">DEGEN</text>
  <text x="118" y="694" font-family="Anton" font-size="248" fill="#cc0000" letter-spacing="3">OR DEATH</text>

  <!-- manifesto line -->
  <text x="124" y="788" font-family="IBM Plex Mono" font-size="34" fill="#b87a7a" letter-spacing="6">YOU WERE NOT INVITED &#183; THE DOOR IS LOCKED FROM THE INSIDE</text>
  <text x="124" y="838" font-family="IBM Plex Mono" font-size="34" fill="#b87a7a" letter-spacing="6">WE HAVE ALREADY LET YOU IN &#183; SHOES OFF &#183; PROCEED</text>

  <!-- scanline overlay -->
  <rect width="1920" height="1080" fill="url(#sp-scan)"/>
</svg>
