<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- background -->
  <rect width="512" height="512" fill="#040404"/>

  <!-- subtle grid -->
  <g stroke="rgba(204,0,0,0.04)" stroke-width="1">
    <line x1="0" y1="64"  x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64"  y1="0" x2="64"  y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- glow plate behind sigil -->
  <circle cx="256" cy="256" r="220" fill="#1a0000"/>

  <!-- outer black frame (thick) -->
  <rect x="68" y="68" width="376" height="376" fill="none" stroke="#000" stroke-width="10"/>

  <!-- oxblood inner panel -->
  <rect x="84" y="84" width="344" height="344" fill="#cc0000"/>

  <!-- top bulb marquee strip -->
  <g fill="#ff2222">
    <circle cx="116" cy="64" r="7"/>
    <circle cx="172" cy="64" r="7"/>
    <circle cx="228" cy="64" r="7"/>
    <circle cx="284" cy="64" r="7"/>
    <circle cx="340" cy="64" r="7"/>
    <circle cx="396" cy="64" r="7"/>
  </g>

  <!-- bottom bulb marquee strip -->
  <g fill="#ff2222">
    <circle cx="116" cy="448" r="7"/>
    <circle cx="172" cy="448" r="7"/>
    <circle cx="228" cy="448" r="7"/>
    <circle cx="284" cy="448" r="7"/>
    <circle cx="340" cy="448" r="7"/>
    <circle cx="396" cy="448" r="7"/>
  </g>

  <!-- face: two asymmetric eye slits + vertical mouth -->
  <g fill="#040404">
    <!-- left eye -->
    <rect x="120" y="200" width="120" height="26"/>
    <!-- right eye (slightly off-axis to make it feel wrong) -->
    <rect x="272" y="206" width="120" height="22" transform="rotate(1.5 332 217)"/>
    <!-- mouth slit -->
    <rect x="245" y="288" width="22" height="120"/>
  </g>

  <!-- single watching pupil in the left eye, off-center -->
  <circle cx="208" cy="213" r="9" fill="#ff5aa0"/>

  <!-- scanlines overlay -->
