<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- Server banner — keyhole right, wordmark left, operator tick rails. -->
  <defs>
    <radialGradient id="bn-bg" cx="72%" cy="36%" r="92%">
      <stop offset="0%" stop-color="#1a0c0a"/>
      <stop offset="55%" stop-color="#0a0403"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <radialGradient id="bn-bloom" cx="76%" cy="46%" r="46%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bn-key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3636"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#7c0000"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bn-bg)"/>
  <circle cx="730" cy="262" r="240" fill="url(#bn-bloom)"/>

  <!-- top + bottom tick rails -->
  <line x1="0" y1="38" x2="960" y2="38" stroke="#2b0000" stroke-width="2"/>
  <line x1="0" y1="45" x2="960" y2="45" stroke="#cc0000" stroke-width="6" stroke-dasharray="2 15"/>
  <line x1="0" y1="498" x2="960" y2="498" stroke="#cc0000" stroke-width="6" stroke-dasharray="2 15"/>
  <line x1="0" y1="505" x2="960" y2="505" stroke="#2b0000" stroke-width="2"/>

  <!-- partial gauge arc behind the keyhole -->
  <circle cx="734" cy="272" r="196" fill="none" stroke="#cc0000" stroke-width="9"
          stroke-dasharray="3 24" opacity="0.5"/>

  <!-- keyhole, right -->
  <g>
    <circle cx="734" cy="214" r="86" fill="#1c0000"/>
    <path d="M 700 196 L 662 406 L 806 406 L 768 196 Z" fill="#1c0000"/>
    <circle cx="734" cy="214" r="78" fill="url(#bn-key)"/>
    <path d="M 708 202 L 674 398 L 794 398 L 760 202 Z" fill="url(#bn-key)"/>
    <ellipse cx="710" cy="194" rx="22" ry="17" fill="#ff6868" opacity="0.5"/>
  </g>

  <!-- wordmark -->
  <text x="68" y="244" font-family="Anton" font-size="128" fill="#f0ebe3" letter-spacing="2">DEGEN</text>
  <text x="68" y="360" font-family="Anton" font-size="128" fill="#cc0000" letter-spacing="2">OR DEATH</text>

  <!-- tagline -->
  <text x="72" y="418" font-family="IBM Plex Mono" font-size="18" fill="#8a857f" letter-spacing="3">// the door is locked from the inside</text>
  <text x="72" y="446" font-family="IBM Plex Mono" font-size="18" fill="#8a857f" letter-spacing="3">&#160;&#160; proceed voluntarily &#183; no attorney present</text>
</svg>
